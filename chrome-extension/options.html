<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OrgCloud Space Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="container">
    <h1>OrgCloud Space</h1>
    <p class="hint">Enter the URL of your published OrgCloud Space app.</p>
    <label for="url-input">API URL</label>
    <input type="url" id="url-input" placeholder="https://your-app.replit.app" spellcheck="false">
    <div id="status"></div>
    <button id="save-btn">[save]</button>
    <div id="help">
      <p>1. Publish your OrgCloud Space app on Replit</p>
      <p>2. Paste the URL above (e.g. https://orgcloud.replit.app)</p>
      <p>3. Press Alt+C on any page to open capture</p>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
