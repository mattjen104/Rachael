<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrgCloud Space</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="header">
    <span id="status-indicator">●</span>
    <span id="status-text">connecting...</span>
    <button id="settings-btn" title="Settings">⚙</button>
  </div>
  <div id="not-configured">
    <p>Set your OrgCloud Space URL in settings.</p>
    <button id="open-settings-btn">⚙ Open Settings</button>
  </div>
  <div id="recording-bar" style="display:none;">
    <span id="rec-indicator">●</span>
    <span id="rec-label">Recording</span>
    <span id="rec-tab-info"></span>
    <span id="rec-duration">0:00</span>
    <button id="rec-stop-btn">■ Stop</button>
  </div>
  <div id="rec-controls" style="display:none;">
    <button id="rec-tab-btn" title="Record tab audio">🔊 Record Tab</button>
  </div>
  <iframe id="app-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" allow="clipboard-read; clipboard-write" tabindex="0"></iframe>
  <script src="sidepanel.js"></script>
</body>
</html>
